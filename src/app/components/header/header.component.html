<header class="h-14 bg-white/95 dark:bg-slate-950/95 backdrop-blur-sm border-b border-gray-200 dark:border-slate-800 sticky top-0 z-50 transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-6 h-full grid grid-cols-[auto_1fr_auto] items-center gap-6">

    <a routerLink="/home" class="flex items-center gap-2 group shrink-0">
      <img src="favicon.png" alt="Logo DevNaRTC" class="w-7 h-7 shrink-0" />
      <span class="font-bold text-gray-900 dark:text-white tracking-tight">DevNaRTC</span>
    </a>

    <nav class="hidden md:flex items-center justify-center gap-0.5 h-full">
      @for (item of itensMenu; track item.rota) {
        <a [routerLink]="['/', item.rota]"
           routerLinkActive="text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/50 font-semibold"
           class="px-3 py-1.5 rounded-lg text-sm text-gray-600 dark:text-slate-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-slate-800/80 transition-all duration-150 whitespace-nowrap font-medium">
          {{ item.titulo }}
        </a>
      }
    </nav>

    <button (click)="alternarModoEscuro()"
            title="Alternar modo escuro/claro"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors shrink-0">
      @if (!modoEscuroAtivo()) {
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      } @else {
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      }
    </button>

  </div>
</header>
